<style>
  * { box-sizing: border-box; }

  :root {
    /* Scala fluida: cambia in base alla larghezza reale del viewport,
       cosi' su telefono, tablet e desktop le proporzioni restano coerenti */
    --spazio-xs: clamp(6px, 1vw, 10px);
    --spazio-s: clamp(10px, 1.6vw, 16px);
    --spazio-m: clamp(16px, 2.6vw, 26px);
    --spazio-l: clamp(24px, 4vw, 44px);
    --spazio-xl: clamp(32px, 6vw, 64px);

    --testo-base: clamp(0.95rem, 0.85rem + 0.35vw, 1.1rem);
    --testo-sottotitolo: clamp(1rem, 0.9rem + 0.4vw, 1.2rem);
    --testo-titolo: clamp(1.4rem, 1.15rem + 1.2vw, 2rem);
    --testo-logo: clamp(2rem, 1.5rem + 2.2vw, 3.2rem);
    --testo-tagline: clamp(1.15rem, 1rem + 0.7vw, 1.6rem);
    --testo-piccolo: clamp(0.78rem, 0.72rem + 0.25vw, 0.92rem);

    --larghezza-contenuto: min(92vw, 480px);
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    margin: 0;
    color: #f7efe4;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-color: #3a1e1e;
    font-size: var(--testo-base);
  }

  /* --- SFONDO STATICO (niente foto: solo gradiente) --- */
  #sfondo-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    background:
      radial-gradient(circle at top, rgba(110, 54, 44, 0.72) 0%, rgba(58, 30, 30, 0.9) 46%, #2c1717 100%),
      #3a1e1e;
  }

  #schermata-lingua {
    width: 100%;
    min-height: 100dvh; /* 'dvh' adatta l'altezza anche con le barre dei browser mobile */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-sizing: border-box;
    padding: var(--spazio-m);
    color: #ffffff;
  }

  .schermata {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: var(--larghezza-contenuto);
    padding: var(--spazio-xl) var(--spazio-m) var(--spazio-l);
    margin: 0 auto;
  }
  .schermata.attiva { display: flex; }

  .tagline {
    font-family: 'Brush Script MT', 'Segoe Script', cursive;
    font-size: var(--testo-tagline);
    opacity: 0.9;
    margin-bottom: -0.3em;
  }
  h1.logo {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: var(--testo-logo);
    letter-spacing: 1px;
    color: #ffffff;
    margin: 0 0 var(--spazio-xs) 0;
    text-transform: uppercase;
    text-align: center;
  }
  h2.titolo-pagina {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: var(--testo-titolo);
    color: #ffffff;
    margin: 0 0 var(--spazio-m) 0;
    text-align: center;
  }
  .sottotitolo {
    font-size: var(--testo-sottotitolo);
    margin-bottom: var(--spazio-l);
    line-height: 1.5;
    text-align: center;
  }
  .separatore {
    width: clamp(48px, 8vw, 72px);
    height: 3px;
    background-color: #f7efe4;
    opacity: 0.6;
    border-radius: 2px;
    margin: 0 0 var(--spazio-m) 0;
  }
  .bottoni {
    display: flex;
    flex-direction: column;
    gap: var(--spazio-s);
    width: 100%;
    max-width: 360px;
  }
  button.bottone {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background-color: #f7efe4;
    color: #3a1e1e;
    font-size: clamp(1em, 0.94em + 0.3vw, 1.15em);
    font-weight: 700;
    padding: clamp(14px, 2.2vw, 19px) clamp(20px, 4vw, 30px);
    border: none;
    border-radius: 30px;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background-color 0.2s ease, transform 0.1s ease;
  }
  button.bottone:hover { background-color: #ffffff; }
  button.bottone:active { transform: scale(0.98); }
  button.bottone.secondario {
    background-color: transparent;
    color: #f7efe4;
    border: 2px solid #f7efe4;
  }
  button.bottone.secondario:hover { background-color: rgba(247,239,228,0.1); }
  .icona { font-size: 1.3em; }

  a.link-testo, span.link-testo {
    margin-top: var(--spazio-l);
    color: #f7efe4;
    opacity: 0.7;
    font-size: var(--testo-piccolo);
    text-decoration: none;
    cursor: pointer;
  }
  a.link-testo:hover, span.link-testo:hover { opacity: 1; text-decoration: underline; }

  .barra-nav {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: var(--spazio-xs);
    font-size: var(--testo-piccolo);
  }
  .barra-nav span { opacity: 0.75; cursor: pointer; }
  .barra-nav span:hover { opacity: 1; text-decoration: underline; }

  .nota-info {
    font-style: italic;
    font-size: var(--testo-piccolo);
    opacity: 0.85;
    line-height: 1.5;
    margin-bottom: var(--spazio-l);
    text-align: center;
  }
  .nota-info p { margin: 0.4em 0; }

  .sezione { 
    width: 100%; 
    margin-bottom: var(--spazio-l); 
    padding-top: var(--spazio-xs);
  }
  .sezione h3 {
    font-family: 'Arial Black', Arial, sans-serif;
    font-weight: 900;
    font-size: clamp(1.15rem, 1.05rem + 0.5vw, 1.5rem);
    color: #ffffff;
    margin: 0 0 var(--spazio-s) 0;
  }
  .voce {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    padding: clamp(7px, 1vw, 11px) 0;
    border-bottom: 1px solid rgba(247,239,228,0.12);
  }
  .voce .nome { font-size: 0.98em; }
  .voce .prezzo { font-weight: 700; white-space: nowrap; }

  .tabella-vino { width: 100%; }
  .tabella-vino .intestazione {
    display: flex;
    justify-content: flex-end;
    gap: clamp(10px, 2vw, 18px);
    font-size: var(--testo-piccolo);
    font-weight: 700;
    opacity: 0.75;
    padding: 4px 0 8px 0;
  }
  .tabella-vino .intestazione span { width: 58px; text-align: right; }
  .tabella-vino .voce-vino {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: clamp(7px, 1vw, 11px) 0;
    border-bottom: 1px solid rgba(247,239,228,0.12);
    gap: 12px;
  }
  .tabella-vino .voce-vino .nome { flex: 1; font-size: 0.98em; }
  .tabella-vino .voce-vino .prezzi { display: flex; gap: clamp(10px, 2vw, 18px); }
  .tabella-vino .voce-vino .prezzi span { width: 58px; text-align: right; font-weight: 700; white-space: nowrap; }

  .coperto {
    margin-top: var(--spazio-s);
    text-align: center;
    font-weight: 700;
    opacity: 0.9;
  }

  .torna-inizio {
    margin-top: var(--spazio-m);
    text-align: center;
  }

  .avviso-pranzo {
    font-size: var(--testo-piccolo);
    font-style: italic;
    opacity: 0.75;
    text-align: center;
    margin-bottom: var(--spazio-l);
  }

  /* --- ADATTAMENTO PER TABLET --- */
  @media (min-width: 700px) {
    :root {
      --larghezza-contenuto: min(80vw, 620px);
    }
    .schermata {
      padding-top: var(--spazio-xl);
      padding-bottom: var(--spazio-xl);
    }
    .bottoni { max-width: 400px; }
  }

  /* --- ADATTAMENTO PER DESKTOP / SCHERMI GRANDI --- */
  @media (min-width: 1024px) {
    :root {
      --larghezza-contenuto: min(60vw, 760px);
    }
    body { padding: var(--spazio-l) 0; }
    .schermata {
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.12);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }
    .bottoni { max-width: 440px; }
    button.bottone:hover { transform: translateY(-1px); }
  }

  /* --- ADATTAMENTO PER SCHERMI MOLTO GRANDI --- */
  @media (min-width: 1440px) {
    :root {
      --larghezza-contenuto: min(45vw, 860px);
    }
  }

  /* --- ORIENTAMENTO ORIZZONTALE SU MOBILE (schermo basso) --- */
  @media (max-height: 480px) and (orientation: landscape) {
    #schermata-lingua { padding: var(--spazio-s); }
    .schermata { padding-top: var(--spazio-m); padding-bottom: var(--spazio-m); }
    .tagline { margin-bottom: 0; }
    .sottotitolo { margin-bottom: var(--spazio-s); }
  }
</style>

  <div class="torna-inizio">
    <span class="link-testo" onclick="mostraCategoria()" id="cont-torna"></span>
  </div>
</div>

/* ---------- FASCIA ORARIA PRANZO (11:30 - 15:00) ---------- */
function isOrarioPranzo() {
  const ora = new Date();
  const minutiTotali = ora.getHours() * 60 + ora.getMinutes();
  const inizioPranzo = 11 * 60 + 30;  // 11:30
  const finePranzo = 15 * 60;         // 15:00
  return minutiTotali >= inizioPranzo && minutiTotali < finePranzo;
}

/* ---------- GIORNO DELLA SETTIMANA CORRENTE ---------- */
function giornoCorrente() {
  const codici = ['dom','lun','mar','mer','gio','ven','sab'];
  return codici[new Date().getDay()];
}

/* ---------- VERIFICA SE UN PIATTO VA NASCOSTO ORA ---------- */
function vaNascostoAPranzo(giorniNascondi) {
  if (!giorniNascondi) return false;
  if (giorniNascondi === true) return isOrarioPranzo();
  if (!isOrarioPranzo()) return false;
  return giorniNascondi.includes(giornoCorrente());
}

/* ---------- NAVIGAZIONE ---------- */
function nascondiTutte() {
  document.querySelectorAll('.schermata').forEach(s => s.classList.remove('attiva'));
}

function selezionaLingua(lingua) {
  linguaCorrente = lingua;
  aggiornaTestiCategoria();
  nascondiTutte();
  document.getElementById('schermata-categoria').classList.add('attiva');
}

function mostraLingua() {
  nascondiTutte();
  document.getElementById('schermata-lingua').classList.add('attiva');
}

function mostraCategoria() {
  aggiornaTestiCategoria();
  nascondiTutte();
  document.getElementById('schermata-categoria').classList.add('attiva');
}

function aggiornaTestiCategoria() {
  const t = ui[linguaCorrente];
  document.getElementById('cat-titolo').textContent = t.catTitolo;
  document.getElementById('cat-piatti').textContent = t.piatti;
  document.getElementById('cat-vini').textContent = t.vini;
  document.getElementById('cat-birre').textContent = t.birre;
  document.getElementById('cat-cambia-lingua').textContent = t.cambiaLingua;
}

function mostraContenuto(tipo) {
  const t = ui[linguaCorrente];
  let dati;
  if (tipo === 'piatti') dati = piattiData[linguaCorrente];
  if (tipo === 'vini') dati = viniData[linguaCorrente];
  if (tipo === 'birre') dati = birreData[linguaCorrente];

  document.getElementById('nav-indietro').textContent = t.indietro;
  document.getElementById('nav-lingua').textContent = t.cambiaLingua;
  document.getElementById('cont-torna').textContent = t.tornaCategorie;
  document.getElementById('cont-titolo').textContent = dati.titolo;

  const notaEl = document.getElementById('cont-nota');
  notaEl.innerHTML = '';
  if (dati.nota) {
    dati.nota.forEach(p => {
      const el = document.createElement('p');
      el.textContent = p;
      notaEl.appendChild(el);
    });
  }

  const pranzoAttivo = isOrarioPranzo();
  let almenoUnoNascosto = false;

  const corpo = document.getElementById('cont-corpo');
  corpo.innerHTML = '';

  if (tipo === 'piatti' && pranzoAttivo) {
    dati.sezioni.forEach(sez => {
      if (!sez.tabella && sez.items.some(it => vaNascostoAPranzo(it[2]))) almenoUnoNascosto = true;
    });
    if (almenoUnoNascosto) {
      const avviso = document.createElement('div');
      avviso.className = 'avviso-pranzo';
      avviso.textContent = t.avvisoPranzo;
      corpo.appendChild(avviso);
    }
  }

  dati.sezioni.forEach(sez => {
    const sezDiv = document.createElement('div');
    sezDiv.className = 'sezione';

    const h3 = document.createElement('h3');
    h3.textContent = sez.titolo;
    sezDiv.appendChild(h3);

    if (sez.tabella) {
      const tab = document.createElement('div');
      tab.className = 'tabella-vino';
      const intest = document.createElement('div');
      intest.className = 'intestazione';
      sez.colonne.forEach(c => {
        const s = document.createElement('span');
        s.textContent = c;
        intest.appendChild(s);
      });
      tab.appendChild(intest);
      sez.items.forEach(([nome, prezzi]) => {
        const riga = document.createElement('div');
        riga.className = 'voce-vino';
        const nomeEl = document.createElement('span');
        nomeEl.className = 'nome';
        nomeEl.textContent = nome;
        const prezziEl = document.createElement('div');
        prezziEl.className = 'prezzi';
        prezzi.forEach(p => {
          const s = document.createElement('span');
          s.textContent = p;
          prezziEl.appendChild(s);
        });
        riga.appendChild(nomeEl);
        riga.appendChild(prezziEl);
        tab.appendChild(riga);
      });
      sezDiv.appendChild(tab);
    } else {
      let visibili = 0;
      sez.items.forEach(([nome, prezzo, giorniNascondi]) => {
        if (tipo === 'piatti' && vaNascostoAPranzo(giorniNascondi)) return;
        visibili++;
        const riga = document.createElement('div');
        riga.className = 'voce';
        const nomeEl = document.createElement('span');
        nomeEl.className = 'nome';
        nomeEl.textContent = nome;
        const prezzoEl = document.createElement('span');
        prezzoEl.className = 'prezzo';
        prezzoEl.textContent = prezzo;
        riga.appendChild(nomeEl);
        riga.appendChild(prezzoEl);
        sezDiv.appendChild(riga);
      });
      if (visibili === 0) return;
    }

    corpo.appendChild(sezDiv);
  });

  if (dati.coperto) {
    const cop = document.createElement('div');
    cop.className = 'coperto';
    cop.textContent = dati.coperto;
    corpo.appendChild(cop);
  }

  nascondiTutte();
  document.getElementById('schermata-contenuto').classList.add('attiva');
  window.scrollTo(0, 0);
}
</script>
