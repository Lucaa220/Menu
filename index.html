<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Ristorante</title>
  <style>
    body {
      font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #faf7f2;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 1.4em;
      color: #333;
      margin-bottom: 30px;
    }
    .bottoni {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 320px;
    }
    a.bottone {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: #c0392b;
      color: #ffffff;
      text-decoration: none;
      font-size: 1.1em;
      padding: 16px 28px;
      border-radius: 8px;
      font-weight: bold;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }
    a.bottone:hover {
      background-color: #a93226;
    }
    a.bottone:active {
      transform: scale(0.98);
    }
    a.bottone.secondario {
      background-color: #2c3e50;
    }
    a.bottone.secondario:hover {
      background-color: #1f2c38;
    }
    .bandiera {
      font-size: 1.3em;
    }
    p.note {
      margin-top: 24px;
      color: #777;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <h1>Scegli la lingua del menu<br>Choose your menu language</h1>
  <div class="bottoni">
    <a class="bottone" href="menu.pdf">
      <span class="bandiera">🇮🇹</span> Menu in Italiano
    </a>
    <a class="bottone secondario" href="menu-en.pdf">
      <span class="bandiera">🇬🇧</span> Menu in English
    </a>
  </div>
  <p class="note">Tocca un pulsante per aprire il PDF del menu</p>
</body>
</html>
